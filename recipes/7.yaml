model:
  type: random_forest
  search:
    n_trials: 1000
    cv_folds: 5
    scoring: min_class_recall
    direction: maximize
    save_top_models: 50
    space:
      n_estimators:
        low: 350
        high: 450
        step: 50
      max_depth:
        low: 14
        high: 15
        step: 1
      min_samples_split:
        low: 10
        high: 19
        step: 1
      min_samples_leaf:
        low: 1
        high: 2
        step: 1
      max_features:
        low: 0.2
        high: 0.35
      bootstrap: [false]
    feature_selection:
      lasso:
        enabled: true
        C: 1.0
        threshold: 0.00000001
        max_iter: 5000
        tol: 0.001
